<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Attendance System • Edit Student</title>

    <link rel="icon"
          type="image/x-icon"
          href="{{ url_for('static', filename='images/school.ico') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

    <h1>✏️ Edit Student</h1>

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">

                <label>Student ID</label>

                <input
                    type="text"
                    value="{{ student[0] }}"
                    readonly>

            </div>

            <div class="form-group">

                <label>Student Name</label>

                <input
                    type="text"
                    name="name"
                    value="{{ student[1] }}"
                    required>

            </div>

            <div class="form-group">

                <label>Course</label>

                <input
                    type="text"
                    name="course"
                    value="{{ student[2] }}"
                    required>

            </div>

            <div class="form-group">

                <label>Year</label>

                <input
                    type="text"
                    name="year"
                    value="{{ student[3] }}"
                    required>

            </div>

            <div class="form-group">

                <label>Session</label>

                <input
                    type="text"
                    name="session"
                    value="{{ student[4] }}"
                    required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    value="{{ student[5] }}">

            </div>

            <div class="form-group">

                <label>Phone Number</label>

                <input
                    type="text"
                    name="phone"
                    value="{{ student[6] }}">

            </div>

        </div>

        <div class="button-group">

            <button
                type="submit"
                class="update-btn">

                💾 Update Student

            </button>

            <a href="{{ url_for('student.student_list') }}">

                <button
                    type="button"
                    class="back-btn">

                    ← Back to Students

                </button>

            </a>

    </form>

    </div>

</div>

<footer>

    © 2026 AI Attendance Monitoring System | Developed by Prerana Verma

</footer>

</body>

</html>
